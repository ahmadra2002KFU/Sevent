<style>
  :root {
    /* Brand palette (from /Claude Docs/design-tokens.md) */
    --navy-900:#0f2e5c; --navy-700:#1c3f73; --navy-500:#355b95;
    --cobalt-500:#1e7bd8; --cobalt-400:#3d91e5; --cobalt-100:#dcebfb;
    --gold-500:#c8993a; --gold-100:#f6ebce;
    --n-50:#fafaf7; --n-100:#f4f4ef; --n-200:#e7e6df;
    --n-400:#a9a9a1; --n-600:#6b6b64; --n-900:#1a1a18;
    --ok-500:#1e9a5b; --ok-100:#d8f1e3;
    --warn-500:#d89423; --warn-100:#faebd3;
    --danger-500:#c4353c; --danger-100:#f6d7d9;

    --shadow-sm: 0 1px 2px rgba(15,46,92,.04);
    --shadow: 0 1px 3px rgba(15,46,92,.08), 0 1px 2px rgba(15,46,92,.04);
    --shadow-md: 0 4px 6px rgba(15,46,92,.08), 0 2px 4px rgba(15,46,92,.04);
    --shadow-lg: 0 10px 15px rgba(15,46,92,.08), 0 4px 6px rgba(15,46,92,.04);

    --r-sm:2px; --r-md:6px; --r-lg:8px; --r-xl:12px; --r-2xl:16px;
  }
  html, body { margin:0; padding:0; }
  body { font-family: 'Inter', system-ui, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }

  /* Mockup shell: each artboard renders a self-contained piece of UI at 1280x860 */
  .mk {
    font-family: 'Tajawal', 'Inter', system-ui, sans-serif;
    direction: rtl;
    color: var(--n-900);
    background: var(--n-50);
    width: 100%; height: 100%;
    overflow: hidden;
    position: relative;
  }
  .mk[data-dir="ltr"] { direction: ltr; font-family: 'Inter', system-ui, sans-serif; }
  .mk ::selection { background: var(--cobalt-100); }

  /* Reset-y bits so Tailwind-flavoured classnames don't conflict */
  .mk button { font: inherit; color: inherit; cursor: pointer; border: none; background: none; padding: 0; }
  .mk input, .mk textarea, .mk select { font: inherit; color: inherit; }
  .mk h1, .mk h2, .mk h3, .mk h4, .mk p { margin: 0; }
  .mk ul, .mk ol { margin: 0; padding: 0; list-style: none; }

  /* Scrollbar reset inside artboards */
  .mk *::-webkit-scrollbar { width: 6px; height: 6px; }
  .mk *::-webkit-scrollbar-thumb { background: var(--n-200); border-radius: 3px; }

  /* Helpful: any element with data-rtl-flip gets scaleX(-1) to mirror icons */
  [data-rtl-flip] { transform: scaleX(-1); }

  /* Animated background for "bold" direction — navy mesh */
  @keyframes floatOrb { 0%,100% { transform: translate(0,0) } 50% { transform: translate(20px,-20px) } }
  @keyframes pulse { 0%,100% { opacity:.45 } 50% { opacity:.85 } }
  @keyframes sheen { 0% { transform: translateX(-100%) } 100% { transform: translateX(400%) } }
  @keyframes bob { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-6px) } }
</style>
