<!DOCTYPE html>
<html>
<head>
<style>
  html { background: #F4F6F6; }
  body {
    width: 720pt; height: 405pt; margin: 0; padding: 0;
    background: #F4F6F6; font-family: Georgia, 'Times New Roman', serif;
    display: flex;
  }
  .left-band {
    width: 220pt; height: 405pt; background: #1C2833;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 40pt 30pt; box-sizing: border-box;
  }
  .brand { color: #BF9A4A; font-family: Arial, sans-serif; font-size: 14pt; letter-spacing: 4pt; font-weight: bold; margin: 0; }
  .tag { color: #AAB7B8; font-family: Arial, sans-serif; font-size: 10pt; margin: 0; }
  .right {
    flex: 1; padding: 60pt 50pt; box-sizing: border-box;
    display: flex; flex-direction: column; justify-content: center;
  }
  h1 { font-family: Georgia, serif; font-size: 42pt; color: #1C2833; margin: 0 0 10pt 0; line-height: 1.1; }
  .underline { width: 60pt; height: 4pt; background: #BF9A4A; margin: 12pt 0 20pt 0; border-radius: 2pt; }
  .subtitle { font-family: Arial, sans-serif; font-size: 18pt; color: #2E4053; margin: 0 0 28pt 0; font-weight: normal; }
  .highlight { font-family: Arial, sans-serif; font-size: 13pt; color: #2E4053; margin: 0 0 8pt 0; }
  .accent { color: #BF9A4A; font-weight: bold; }
  .date { font-family: Arial, sans-serif; font-size: 10pt; color: #AAB7B8; margin-top: 30pt; letter-spacing: 1pt; }
</style>
</head>
<body>
  <div class="left-band">
    <div>
      <p class="brand">SEVENT</p>
      <p class="tag">The Saudi event marketplace</p>
    </div>
    <div>
      <p class="tag">Pilot target — July 2026</p>
    </div>
  </div>
  <div class="right">
    <h1>Weekly Progress Report</h1>
    <div class="underline"></div>
    <p class="subtitle">Where we are at the halfway mark</p>
    <p class="highlight"><span class="accent">3 of 6</span> sprints delivered</p>
    <p class="highlight"><span class="accent">~50%</span> of the pilot system built</p>
    <p class="highlight">Supplier side <span class="accent">end-to-end</span> · Organizer RFQ flow <span class="accent">live</span></p>
    <p class="date">PREPARED 2026-04-16</p>
  </div>
</body>
</html>
