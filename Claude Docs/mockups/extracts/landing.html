<style>
  :root {
    --navy-900:#0f2e5c;
    --navy-700:#1c3f73;
    --navy-500:#355b95;
    --cobalt-500:#1e7bd8;
    --cobalt-400:#3d91e5;
    --cobalt-100:#dcebfb;
    --gold-500:#c8993a;
    --gold-100:#f6ebce;
    --n50:#fafaf7;
    --n100:#f4f4ef;
    --n200:#e7e6df;
    --n400:#a9a9a1;
    --n600:#6b6b64;
    --n900:#1a1a18;
    --success-500:#1e9a5b;
    --success-100:#d8f1e3;

    --font-sans: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --radius: 0.5rem;

    --shadow-sm: 0 1px 2px rgb(15 46 92 / 0.04);
    --shadow: 0 1px 3px rgb(15 46 92 / .08), 0 1px 2px rgb(15 46 92 / .04);
    --shadow-md: 0 4px 6px rgb(15 46 92 / .08), 0 2px 4px rgb(15 46 92 / .04);
    --shadow-lg: 0 10px 15px rgb(15 46 92 / .08), 0 4px 6px rgb(15 46 92 / .04);
  }
  :root[lang="ar"], html[dir="rtl"] {
    --font-sans: "Almarai", ui-sans-serif, system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body {
    font-family: var(--font-sans);
    background: var(--n50);
    color: var(--n900);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  :lang(ar) body, [dir="rtl"] body { line-height: 1.85; }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: 0; background: none; }
  img { display: block; max-width: 100%; }

  /* ---------- Layout primitives ---------- */
  .wrap { max-width: 1200px; margin-inline: auto; padding-inline: 24px; }
  @media (max-width: 640px){ .wrap { padding-inline: 18px; } }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 600;
    letter-spacing: .22em; text-transform: uppercase;
    color: var(--cobalt-500);
  }
  .eyebrow.on-dark { color: rgba(255,255,255,.85); }
  .eyebrow .dot { width:6px; height:6px; border-radius:999px; background: var(--gold-500); }
  :lang(ar) .eyebrow { letter-spacing: 0; }

  h1,h2,h3,h4 { font-family: var(--font-sans); margin:0; letter-spacing: -0.02em; color: var(--navy-900); }
  :lang(ar) h1, :lang(ar) h2, :lang(ar) h3, :lang(ar) h4 { letter-spacing: 0; }
  h1 { font-weight: 900; }
  h2 { font-weight: 800; }
  h3 { font-weight: 700; }

  p { margin: 0; }

  /* ---------- Buttons ---------- */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 18px; border-radius: 10px;
    font-size: 15px; font-weight: 600;
    transition: all .18s ease;
    white-space: nowrap;
  }
  .btn-primary { background: var(--cobalt-500); color: white; box-shadow: var(--shadow-md); }
  .btn-primary:hover { background: var(--cobalt-400); transform: translateY(-1px); }
  .btn-outline-dark { border: 1px solid rgba(255,255,255,.22); color: white; }
  .btn-outline-dark:hover { background: rgba(255,255,255,.08); }
  .btn-outline { border: 1px solid var(--n200); color: var(--navy-900); background: white; }
  .btn-outline:hover { border-color: rgba(30,123,216,.4); }
  .btn-ghost { color: var(--n600); padding: 8px 12px; }
  .btn-ghost:hover { color: var(--navy-900); background: var(--n100); border-radius: 8px; }
  .btn-sm { padding: 8px 14px; font-size: 14px; }
  .btn-lg { padding: 14px 22px; font-size: 16px; }

  [dir="rtl"] .arrow-flip { transform: scaleX(-1); }

  /* ---------- Top nav ---------- */
  .nav {
    position: sticky; top: 0; z-index: 40;
    background: rgba(255,255,255,.82);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--n200);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding-block: 14px;
  }
  .nav-left { display: flex; align-items: center; gap: 32px; }
  .logo { height: 30px; width: auto; }
  .nav-links { display: flex; align-items: center; gap: 4px; }
  .nav-link {
    padding: 8px 12px; border-radius: 8px;
    font-size: 14px; font-weight: 500; color: var(--n600);
  }
  .nav-link:hover { color: var(--navy-900); background: var(--n100); }
  .nav-right { display: flex; align-items: center; gap: 8px; }

  .lang-toggle {
    display: inline-flex; align-items: center; gap: 0;
    background: var(--n100); border-radius: 999px; padding: 3px;
    font-size: 13px; font-weight: 600;
  }
  .lang-toggle button {
    padding: 6px 12px; border-radius: 999px; color: var(--n600);
    font-family: inherit;
  }
  .lang-toggle button.active { background: white; color: var(--navy-900); box-shadow: var(--shadow-sm); }

  @media (max-width: 820px) {
    .nav-links { display: none; }
    .nav-desktop-only { display: none !important; }
  }

  /* ---------- Hero ---------- */
  .hero {
    position: relative; overflow: hidden;
    background: var(--navy-900); color: white;
    padding-block: 88px 112px;
  }
  .hero .wrap { position: relative; z-index: 2; }
  .hero::before, .hero::after {
    content: ""; position: absolute; pointer-events: none;
    top: 50%; transform: translateY(-50%) skewX(12deg);
  }
  .hero::before {
    right: -160px; width: 580px; height: 580px;
    background: var(--navy-700); opacity: .6;
  }
  .hero::after {
    right: -60px; width: 440px; height: 440px;
    background: rgba(30,123,216,.15);
  }
  [dir="rtl"] .hero::before { right:auto; left: -160px; transform: translateY(-50%) skewX(-12deg); }
  [dir="rtl"] .hero::after  { right:auto; left: -60px;  transform: translateY(-50%) skewX(-12deg); }

  .hero-grid {
    display: grid; grid-template-columns: 1.15fr 1fr; gap: 56px; align-items: center;
  }
  @media (max-width: 900px){ .hero-grid { grid-template-columns: 1fr; gap: 40px; } }

  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 999px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.12);
    font-size: 11px; font-weight: 600;
    letter-spacing: .22em; text-transform: uppercase;
    color: rgba(255,255,255,.85);
  }
  :lang(ar) .chip { letter-spacing: 0; font-size: 12px; }
  .chip .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--gold-500); }

  .hero h1 {
    color: white;
    font-size: clamp(36px, 5vw, 60px);
    line-height: 1.05;
    margin-block: 20px 18px;
  }
  :lang(ar) .hero h1 { line-height: 1.2; font-size: clamp(32px, 4.6vw, 54px); }
  .hero .sub {
    font-size: 18px; color: rgba(255,255,255,.78);
    max-width: 540px; line-height: 1.6;
  }
  :lang(ar) .hero .sub { line-height: 1.8; }
  .hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 28px; }

  /* Hero proof card */
  .proof {
    position: relative;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 20px; padding: 28px;
    backdrop-filter: blur(6px);
  }
  .proof-head {
    display: flex; align-items: center; gap: 8px;
    color: var(--gold-500); font-size: 11px; font-weight: 700;
    letter-spacing: .2em; text-transform: uppercase;
  }
  :lang(ar) .proof-head { letter-spacing: 0; font-size: 12px; }
  .proof-value {
    margin-top: 14px; font-size: 24px; font-weight: 700; line-height: 1.3;
    color: white;
  }
  .proof-chips { margin-top: 22px; display: flex; flex-wrap: wrap; gap: 8px; }
  .proof-chip {
    padding: 7px 14px; border-radius: 999px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.14);
    font-size: 13px; color: rgba(255,255,255,.88);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .proof-chip svg { width: 14px; height: 14px; color: var(--cobalt-400); }

  .proof::after {
    content: ""; position: absolute; z-index: -1;
    bottom: -14px; right: -14px;
    width: 140px; height: 90px; border-radius: 18px;
    background: rgba(30,123,216,.25);
  }
  [dir="rtl"] .proof::after { right:auto; left: -14px; }

  .hero-meta {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 16px; margin-top: 22px;
    padding-top: 22px;
    border-top: 1px solid rgba(255,255,255,.1);
  }
  .hero-meta .cell .k { font-size: 22px; font-weight: 800; color: white; }
  .hero-meta .cell .l { font-size: 12px; color: rgba(255,255,255,.65); margin-top: 2px; }

  /* ---------- Trust row ---------- */
  .trust {
    background: var(--n100);
    border-block: 1px solid var(--n200);
    padding-block: 24px;
  }
  .trust-inner {
    display: flex; align-items: center; justify-content: space-between; gap: 32px;
    flex-wrap: wrap;
  }
  .trust-label {
    font-size: 12px; font-weight: 600; color: var(--n600);
    letter-spacing: .2em; text-transform: uppercase;
  }
  :lang(ar) .trust-label { letter-spacing: 0; font-size: 13px; }
  .trust-marks { display: flex; gap: 28px; flex-wrap: wrap; align-items: center; }
  .trust-mark {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 600; color: var(--navy-900);
    opacity: .72;
  }
  .trust-mark svg { width: 18px; height: 18px; color: var(--cobalt-500); }

  /* ---------- Section framing ---------- */
  .section { padding-block: 96px; }
  .section-head { max-width: 720px; margin-bottom: 48px; }
  .section-head h2 {
    font-size: clamp(28px, 3.5vw, 42px);
    margin-top: 14px; line-height: 1.15;
  }
  :lang(ar) .section-head h2 { line-height: 1.3; }
  .section-head .lede {
    margin-top: 16px; font-size: 17px; color: var(--n600); max-width: 620px;
  }
  .section-alt { background: var(--n100); border-block: 1px solid var(--n200); }

  /* ---------- Pillars ---------- */
  .pillars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  @media (max-width: 900px){ .pillars { grid-template-columns: 1fr; } }
  .pillar {
    background: white; border: 1px solid var(--n200); border-radius: 16px;
    padding: 28px; transition: all .18s ease;
  }
  .pillar:hover { border-color: rgba(30,123,216,.3); box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .pillar .icon {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--cobalt-100); color: var(--cobalt-500);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .pillar .icon svg { width: 20px; height: 20px; }
  .pillar h3 { margin-top: 20px; font-size: 18px; }
  .pillar p { margin-top: 10px; font-size: 14px; color: var(--n600); line-height: 1.65; }
  .pillar .learn {
    margin-top: 18px; display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; color: var(--cobalt-500);
  }
  .pillar .learn svg { width: 14px; height: 14px; }

  /* ---------- How it works ---------- */
  .steps {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
    position: relative;
  }
  @media (max-width: 900px){ .steps { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 560px){ .steps { grid-template-columns: 1fr; } }
  .step {
    background: white; border: 1px solid var(--n200); border-radius: 14px;
    padding: 24px; position: relative;
  }
  .step-num {
    position: absolute; top: -14px;
    inset-inline-start: 24px;
    width: 32px; height: 32px; border-radius: 10px;
    background: var(--navy-900); color: white;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px; font-family: "Inter", sans-serif;
    box-shadow: var(--shadow-md);
  }
  .step h3 { font-size: 17px; margin-top: 18px; }
  .step p { margin-top: 8px; font-size: 14px; color: var(--n600); line-height: 1.6; }
  .step .step-icon {
    position: absolute; top: 18px;
    inset-inline-end: 18px;
    color: var(--n400);
  }
  .step .step-icon svg { width: 22px; height: 22px; }

  /* ---------- Feature: RFQ showcase ---------- */
  .showcase {
    display: grid; grid-template-columns: 1fr 1.1fr; gap: 56px;
    align-items: center;
  }
  @media (max-width: 900px){ .showcase { grid-template-columns: 1fr; gap: 40px; } }
  .showcase .copy h2 { font-size: clamp(26px, 3vw, 36px); line-height: 1.2; margin-top: 14px; }
  :lang(ar) .showcase .copy h2 { line-height: 1.35; }
  .showcase .copy .lede { margin-top: 14px; color: var(--n600); font-size: 16px; }
  .bullets { margin-top: 24px; display: flex; flex-direction: column; gap: 14px; }
  .bullet { display: flex; gap: 12px; align-items: flex-start; }
  .bullet .check {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 999px;
    background: var(--success-100); color: var(--success-500);
    display: inline-flex; align-items: center; justify-content: center; margin-top: 2px;
  }
  .bullet .check svg { width: 12px; height: 12px; }
  .bullet strong { color: var(--navy-900); font-weight: 700; }
  .bullet span { display: block; font-size: 14px; color: var(--n600); margin-top: 2px; }

  /* Mock UI panels */
  .mock {
    background: white; border: 1px solid var(--n200); border-radius: 20px;
    box-shadow: var(--shadow-lg); overflow: hidden;
  }
  .mock-head {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 14px 18px; border-bottom: 1px solid var(--n200);
    background: var(--n50);
  }
  .mock-head .title { font-size: 13px; font-weight: 700; color: var(--navy-900); }
  .mock-head .badge {
    font-size: 11px; font-weight: 700; color: var(--cobalt-500);
    background: var(--cobalt-100); padding: 4px 10px; border-radius: 999px;
    letter-spacing: .1em; text-transform: uppercase;
  }
  :lang(ar) .mock-head .badge { letter-spacing: 0; font-size: 12px; }
  .mock-body { padding: 20px; }

  .quote-row {
    display: grid; grid-template-columns: 40px 1fr auto; gap: 14px;
    align-items: center; padding: 14px; border-radius: 12px;
    border: 1px solid var(--n200); background: white;

  .quote-row + .quote-row { margin-top: 10px; }

    font-weight: 800; font-family: "Inter", sans-serif;

  .quote-row .name { font-weight: 700; font-size: 14px; color: var(--navy-900); display: flex; align-items: center; gap: 6px; }
  .quote-row .meta { font-size: 12px; color: var(--n600); margin-top: 2px; display: flex; gap: 10px; flex-wrap: wrap; }

  .verified svg { width: 12px; height: 12px; }
  .quote-row .price { text-align: end; display: flex; flex-direction: column; align-items: flex-end; min-width: 96px; }
  [dir="rtl"] .quote-row .price { align-items: flex-start; text-align: start; }
  .quote-row .amount { font-weight: 800; font-size: 16px; color: var(--navy-900); font-family: "Inter", sans-serif; white-space: nowrap; line-height: 1.2; }
  .quote-row .unit { font-size: 11px; color: var(--n600); margin-top: 2px; white-space: nowrap; }

  .best-tag {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 800; color: white;
    background: var(--gold-500); padding: 2px 7px; border-radius: 999px;
    letter-spacing: .1em; text-transform: uppercase;
  }
  :lang(ar) .best-tag { letter-spacing: 0; font-size: 11px; }

  /* ---------- Categories ---------- */
  .cats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  @media (max-width: 900px){ .cats { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 520px){ .cats { grid-template-columns: 1fr; } }
  .cat {
    background: white; border: 1px solid var(--n200); border-radius: 14px;
    padding: 22px;
    display: flex; flex-direction: column; gap: 18px; min-height: 168px;
    transition: all .18s ease;
    position: relative; overflow: hidden;
  }
  .cat:hover { border-color: rgba(30,123,216,.4); box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .cat:hover .cat-icon { background: var(--cobalt-500); color: white; }
  .cat:hover .arrow { color: var(--cobalt-500); transform: translate(2px, -2px); }
  [dir="rtl"] .cat:hover .arrow { transform: translate(-2px, -2px); }
  .cat-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .cat-icon {
    width: 46px; height: 46px; border-radius: 12px;
    background: var(--n100); color: var(--navy-900);
    display: inline-flex; align-items: center; justify-content: center;
    transition: all .2s ease;
  }
  .cat-icon svg { width: 22px; height: 22px; }
  .cat .arrow { color: var(--n400); transition: all .2s ease; }
  [dir="rtl"] .cat .arrow { transform: scaleX(-1); }
  .cat h3 { font-size: 16px; color: var(--navy-900); }
  .cat .count { font-size: 13px; color: var(--n600); margin-top: 4px; }
  .cat .count b { color: var(--navy-900); font-family: "Inter", sans-serif; }

  /* ---------- Supplier split ---------- */
  .supplier-split {
    display: grid; grid-template-columns: 1.1fr 1fr; gap: 56px; align-items: center;

/* ------------------ RENDER HELPERS ------------------ */
function getByPath(obj, path) {
  return path.split(".").reduce((o, k) => (o == null ? undefined : o[k]), obj);
}

function applyTranslations(lang) {
  const dict = COPY[lang];
  document.querySelectorAll("[data-t]").forEach(el => {
    const k = el.getAttribute("data-t");
    const v = getByPath(dict, k);
    if (typeof v === "string") el.textContent = v;
  });
}

function renderPillars(lang) {
  const mount = document.getElementById("pillars");
  mount.innerHTML = "";
  const iconMap = { "handshake":"handshake", "scale":"scale", "shield-check":"shield-check" };
  COPY[lang].why.items.forEach(it => {
    const el = document.createElement("div");
    el.className = "pillar";
    el.innerHTML = `
      <div class="icon"><i data-lucide="${iconMap[it.icon]}"></i></div>
      <h3>${it.title}</h3>
      <p>${it.body}</p>
      <a href="#" class="learn">${it.link} <svg class="arrow-flip" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></a>
    `;
    mount.appendChild(el);
  });
}

function renderSteps(lang) {
  const mount = document.getElementById("steps");
  mount.innerHTML = "";
  COPY[lang].how.steps.forEach((s, i) => {
    const el = document.createElement("div");
    el.className = "step";
    el.innerHTML = `
      <span class="step-num">${(i+1).toString()}</span>
      <span class="step-icon"><i data-lucide="${s.icon}"></i></span>
      <h3>${s.t}</h3>
      <p>${s.b}</p>
    `;
    mount.appendChild(el);
  });
}

function renderProofChips(lang) {
  const wrap = document.getElementById("proof-chips");
  wrap.innerHTML = "";

  cats.forEach(c => {
    const el = document.createElement("span");
    el.className = "proof-chip";
    el.innerHTML = `<i data-lucide="${c.icon}"></i> ${c.name}`;
    wrap.appendChild(el);
  });
}

function renderQuotes(lang) {
  const mount = document.getElementById("quotes");
  mount.innerHTML = "";
  COPY[lang].test.items.forEach((t, i) => {
    const el = document.createElement("div");
    el.className = "qcard";
    const initial = t.n.trim().charAt(0);
    const palette = [["#dcebfb","#1e7bd8"],["#f6ebce","#c8993a"],["#d8f1e3","#1e9a5b"]][i%3];
    const stars = Array(5).fill(0).map(() => `<svg viewBox="0 0 24 24"><path d="M12 2.5l2.95 6 6.55.95-4.75 4.63 1.12 6.52L12 17.77 6.13 20.6l1.12-6.52L2.5 9.45l6.55-.95z"/></svg>`).join("");
    el.innerHTML = `
      <div class="stars">${stars}</div>
      <blockquote>${t.q}</blockquote>
      <div class="who">
        <span class="avatar" style="background:${palette[0]};color:${palette[1]}">${initial}</span>
        <div>
          <div class="n">${t.n}</div>
          <div class="r">${t.r}</div>
        </div>
      </div>
    `;
    mount.appendChild(el);
  });
}

function renderFaqs(lang) {
  const mount = document.getElementById("faqs");
  mount.innerHTML = "";
  COPY[lang].faq.items.forEach((f, i) => {
    const el = document.createElement("details");
    el.className = "faq";
    if (i === 0) el.open = true;
    el.innerHTML = `
      <summary>
        <span>${f.q}</span>
        <span class="plus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
      </summary>
      <p>${f.a}</p>
    `;
    mount.appendChild(el);
  });
}

/* ------------------ LANG TOGGLE ------------------ */
function setLang(lang) {
  const html = document.documentElement;
  html.lang = lang;
  html.dir = lang === "ar" ? "rtl" : "ltr";
  document.getElementById("lang-en").classList.toggle("active", lang === "en");
  document.getElementById("lang-ar").classList.toggle("active", lang === "ar");
  const tw = document.getElementById("tw-lang");
  if (tw) tw.value = lang;

  applyTranslations(lang);
  renderPillars(lang);
  renderSteps(lang);
  renderShowcaseBullets(lang);
  renderCats(lang);
  renderProofChips(lang);
  renderQuotes(lang);
  renderFaqs(lang);
  if (window.lucide && lucide.createIcons) lucide.createIcons();
  localStorage.setItem("sevent-lang", lang);
  postTweaks({ lang });
}

/* ------------------ ACCENT TWEAK ------------------ */
function setAccent(kind) {
  const root = document.documentElement;
  if (kind === "gold") {
    root.style.setProperty("--cobalt-500", "#c8993a");
    root.style.setProperty("--cobalt-400", "#dfb457");
    root.style.setProperty("--cobalt-100", "#f6ebce");
  } else if (kind === "navy") {
    root.style.setProperty("--cobalt-500", "#1c3f73");
    root.style.setProperty("--cobalt-400", "#355b95");
    root.style.setProperty("--cobalt-100", "#dde3ef");
  } else {
    root.style.setProperty("--cobalt-500", "#1e7bd8");
    root.style.setProperty("--cobalt-400", "#3d91e5");
    root.style.setProperty("--cobalt-100", "#dcebfb");
  }
  postTweaks({ accent: kind });
}

/* ------------------ TWEAKS PROTOCOL ------------------ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "lang": "ar",
  "accent": "cobalt"
}/*EDITMODE-END*/;

function postTweaks(edits) {
  try { window.parent.postMessage({type:'__edit_mode_set_keys', edits}, '*'); } catch(e){}
}

window.addEventListener("message", (e) => {
  const d = e.data || {};
  if (d.type === "__activate_edit_mode") document.getElementById("tweaks").classList.add("open");
  if (d.type === "__deactivate_edit_mode") document.getElementById("tweaks").classList.remove("open");
});
try { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(e){}

/* ------------------ INIT ------------------ */
document.getElementById("year").textContent = new Date().getFullYear();
const initLang = localStorage.getItem("sevent-lang") || TWEAK_DEFAULTS.lang || "en";
setLang(initLang);
setAccent(TWEAK_DEFAULTS.accent || "cobalt");
if (window.lucide && lucide.createIcons) lucide.createIcons();
</script>
